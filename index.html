<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Team Manager Pro - Cloud Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <div class="server-info">
            <span id="serverName">Ładowanie danych serwera...</span>
            <span id="onlineCount" class="count-badge">0/0</span>
        </div>
        
        <div class="user-actions">
            <div id="authButtons">
                <button class="btn-outline" onclick="toggleModal('authModal', true)">ZALOGUJ / REJESTRACJA</button>
            </div>
            <div id="userInfo" style="display: none;">
                <span id="userMail" style="font-size: 11px; color: #888;"></span>
                <button class="btn-logout" onclick="logoutUser()">Wyloguj</button>
            </div>
            <button class="btn-open" onclick="toggleModal('teamModal', true)">+ STWÓRZ TEAM</button>
        </div>
    </div>

    <div class="main-content">
        <div class="section-header">
            <h2>ZAREJESTROWANE DRUŻYNY</h2>
        </div>
        <div id="teamsGrid" class="teams-container"></div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('authModal', false)">&times;</span>
            <div id="authTabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Logowanie</button>
                <button class="tab-btn" onclick="switchAuthTab('register')">Rejestracja</button>
            </div>
            <div id="authFields">
                <div class="form-group">
                    <label>E-MAIL</label>
                    <input type="email" id="authEmail">
                </div>
                <div class="form-group">
                    <label>HASŁO</label>
                    <input type="password" id="authPassword">
                </div>
                <button class="btn-save" id="authSubmit" onclick="handleAuth()">ZALOGUJ SIĘ</button>
            </div>
        </div>
    </div>

    <div id="teamModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('teamModal', false)">&times;</span>
            <h2>Nowy Projekt</h2>
            <div class="form-group">
                <label>NAZWA TEAMU</label>
                <input type="text" id="teamName">
            </div>
            <div class="form-group">
                <label>LINK DO LOGO (URL)</label>
                <input type="text" id="teamLogo" placeholder="http://...">
            </div>
            <div class="form-group">
                <label>KRATKA BAZY</label>
                <input type="text" id="baseGrid">
            </div>
            <div class="form-group">
                <label>HASŁO LIDERA (DO EDYCJI)</label>
                <input type="password" id="leaderPass">
            </div>
            <div class="form-group">
                <label>GRACZE (NICKI PO PRZECINKU)</label>
                <textarea id="teamPlayers" rows="3"></textarea>
            </div>
            <button class="btn-save" onclick="addTeam()">ZAPISZ W CHMURZE</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
