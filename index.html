<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Team Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="verificationOverlay" class="full-overlay" style="display: none;">
        <div class="overlay-content">
            <h1>📧 Weryfikacja e-mail</h1>
            <p>Kliknij link aktywacyjny w swojej poczcie.</p>
            <div class="overlay-buttons">
                <button class="btn-check" onclick="manualCheckStatus()">SPRAWDŹ STATUS</button>
                <button class="btn-save" onclick="resendVerifyEmail()">Wyślij link ponownie</button>
                <button class="btn-outline" onclick="logoutUser()">Wyloguj się</button>
            </div>
        </div>
    </div>

    <div class="top-bar">
        <div class="server-info">
            <span id="serverName">Serwer...</span>
            <span id="onlineCount" class="count-badge">0/0</span>
            <button id="btnCreateTeam" class="btn-open" onclick="toggleModal('teamModal', true)" style="display: none;">+ STWÓRZ TEAM</button>
        </div>
        <div id="userInfo" style="display: none;">
            <span id="userDisplayName"></span>
            <button class="btn-logout" onclick="logoutUser()">Wyloguj</button>
        </div>
        <div id="authButtons">
            <button class="btn-open" onclick="toggleModal('authModal', true)">ZALOGUJ SIĘ</button>
        </div>
    </div>

    <div id="mainContent" class="teams-container"></div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('authModal', false)">&times;</span>
            <div class="auth-tabs">
                <button id="tab-login" class="tab-btn active" onclick="switchAuthTab('login')">Logowanie</button>
                <button id="tab-register" class="tab-btn" onclick="switchAuthTab('register')">Rejestracja</button>
            </div>
            <div class="form-group" id="nickGroup" style="display: none;">
                <label>NICK</label>
                <input type="text" id="authNick">
            </div>
            <div class="form-group">
                <label>E-MAIL</label>
                <input type="text" id="authEmail">
            </div>
            <div class="form-group">
                <label>HASŁO</label>
                <input type="password" id="authPassword">
            </div>
            <button class="btn-save" onclick="handleAuth()">POTWIERDŹ</button>
        </div>
    </div>

    <div id="teamModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('teamModal', false)">&times;</span>
            <h2>🛡️ NOWY TEAM</h2>
            <div class="team-header-input">
                <div class="avatar-upload" onclick="document.getElementById('teamAvatarInput').click()">
                    <input type="file" id="teamAvatarInput" hidden accept="image/*" onchange="previewAvatar(this)">
                    <div id="avatarPreview">📸</div>
                </div>
                <div class="form-group" style="flex:1">
                    <label>NAZWA TEAMU</label>
                    <input type="text" id="teamName">
                </div>
            </div>
            <div class="form-group">
                <label>KRATKA (GRID)</label>
                <input type="text" id="baseGrid">
            </div>
            <div class="form-group">
                <label>GRACZE (Enter)</label>
                <div class="player-input-wrapper">
                    <input type="text" id="playerSearch">
                    <button onclick="addPlayerTag()">+</button>
                </div>
                <div id="playersTagsList" class="tags-container"></div>
            </div>
            <button class="btn-save" onclick="addTeam()">UTWÓRZ</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
