<div id="teamModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="toggleModal('teamModal', false)">&times;</span>
        <h2>🛡️ NOWY TEAM</h2>
        
        <div class="team-header-input">
            <div class="avatar-upload" onclick="document.getElementById('teamAvatarInput').click()">
                <input type="file" id="teamAvatarInput" hidden accept="image/*" onchange="previewAvatar(this)">
                <div id="avatarPreview" class="avatar-placeholder">
                    <svg viewBox="0 0 24 24" width="30" fill="#444"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                </div>
            </div>
            <div class="form-group" style="flex-grow: 1;">
                <label>NAZWA TEAMU</label>
                <input type="text" id="teamName" placeholder="Nazwa Twojej ekipy">
            </div>
        </div>

        <div class="form-group">
            <label>KRATKA BAZY (GRID)</label>
            <input type="text" id="baseGrid" placeholder="np. M21">
        </div>

        <div class="form-group">
            <label>DODAJ GRACZY</label>
            <div class="player-input-wrapper">
                <input type="text" id="playerSearch" placeholder="Wpisz nick i naciśnij Enter">
                <button type="button" onclick="addPlayerTag()">+</button>
            </div>
            <div id="playersTagsList" class="tags-container">
                </div>
        </div>

        <button class="btn-save" onclick="addTeam()">UTWÓRZ DRUŻYNĘ</button>
    </div>
</div>
