<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Team Manager</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-left">
            <div class="status-dot"></div>
            <div class="server-meta">
                <div class="server-row-top">
                    <span id="serverName">ŁĄCZENIE...</span>
                    <button id="btnCreateTeam" class="btn-nav-rust" onclick="toggleModal('teamModal', true)" style="display: none;">+ STWÓRZ TEAM</button>
                </div>
                <div class="server-row-bottom">
                    <span id="onlineCount" class="badge">0/0</span>
                </div>
            </div>
        </div>
        
        <div class="top-bar-right">
            <div id="authButtons">
                <button class="btn-text-only" onclick="toggleModal('authModal', true); switchAuthTab('login')">ZALOGUJ SIĘ</button>
                <span class="nav-divider">|</span>
                <button class="btn-text-only" onclick="toggleModal('authModal', true); switchAuthTab('register')">ZAREJESTRUJ SIĘ</button>
            </div>
            <div id="userInfo" style="display: none;">
                <span id="userDisplayName" class="user-nick"></span>
                <button class="btn-logout-sm" onclick="logoutUser()">WYLOGUJ</button>
            </div>
        </div>
    </div>

    <div class="container">
        <h2 class="section-title">ZAREJESTROWANE DRUŻYNY</h2>
        <div id="teamsGrid" class="teams-grid"></div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('authModal', false)">&times;</span>
            <div class="auth-tabs">
                <button id="tab-login" class="tab-btn active" onclick="switchAuthTab('login')">LOGOWANIE</button>
                <button id="tab-register" class="tab-btn" onclick="switchAuthTab('register')">REJESTRACJA</button>
            </div>
            <div id="nickGroup" class="form-group" style="display: none;">
                <label>TWÓJ NICK</label>
                <input type="text" id="authNick" placeholder="Nick z gry">
            </div>
            <div class="form-group">
                <label>E-MAIL</label>
                <input type="email" id="authEmail">
            </div>
            <div class="form-group">
                <label>HASŁO</label>
                <input type="password" id="authPassword">
            </div>
            <button class="btn-rust-main" onclick="handleAuth()">POTWIERDŹ</button>
            <div class="separator"><span class="separator-text">LUB</span></div>
            <button class="btn-google" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> KONTYNUUJ PRZEZ GOOGLE
            </button>
        </div>
    </div>

    <div id="teamModal" class="modal">
        <div class="modal-content team-modal-wide">
            <span class="close-btn" onclick="toggleModal('teamModal', false)">&times;</span>
            <h2 class="rust-title">🛡️ UTWÓRZ DRUŻYNĘ</h2>
            <div class="team-setup-row">
                <div class="avatar-section">
                    <label>LOGO</label>
                    <div class="avatar-picker" onclick="document.getElementById('avatarInput').click()">
                        <input type="file" id="avatarInput" hidden accept="image/png, image/jpeg" onchange="handleAvatarPreview(this)">
                        <img id="avatarPreview" src="" style="display:none;">
                        <span id="avatarPlaceholder">📸</span>
                    </div>
                </div>
                <div style="flex:1">
                    <div class="form-group">
                        <label>NAZWA TEAMU</label>
                        <input type="text" id="teamName">
                    </div>
                    <div class="form-group">
                        <label>GRID BAZY</label>
                        <input type="text" id="baseGrid" placeholder="np. M12">
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>DODAJ CZŁONKÓW (ENTER)</label>
                <input type="text" id="playerInput">
                <div id="playersTagsList" class="tags-container"></div>
            </div>
            <button class="btn-rust-main" onclick="saveTeam()">ZAPISZ DRUŻYNĘ</button>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('playerModal', false)">&times;</span>
            <h2 id="modalPlayerName" class="rust-title" style="margin-bottom: 10px;">NICK GRACZA</h2>
            <div class="player-stats-box">
                <p>STATUS: <span id="modalPlayerStatus">---</span></p>
                <p style="font-size: 14px; color: #666; margin-top: 20px; line-height: 1.4;">
                    Statystyki szczegółowe (KDA/Godziny) są pobierane z globalnej bazy BattleMetrics.
                </p>
                <button class="btn-rust-main" id="btnPlayerStats" style="margin-top:20px;">PEŁNE STATYSTYKI</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
