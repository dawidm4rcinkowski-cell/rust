<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Team Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <div class="server-info">
            <span id="serverName">Ładowanie...</span>
            <span id="onlineCount" class="count-badge">0/0</span>
        </div>
        
        <div class="user-actions">
            <div id="authButtons">
                <button class="btn-outline" onclick="toggleModal('authModal', true)">ZALOGUJ / REJESTRACJA</button>
            </div>
            <div id="userInfo" style="display: none; align-items: center; gap: 10px;">
                <span id="userDisplayName" style="font-size: 13px; color: #4CAF50; font-weight: bold;"></span>
                <button class="btn-logout" onclick="logoutUser()">Wyloguj</button>
            </div>
            <button class="btn-open" onclick="toggleModal('teamModal', true)">+ STWÓRZ TEAM</button>
        </div>
    </div>

    <div id="teamsGrid" class="teams-container" style="padding: 40px;"></div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('authModal', false)">&times;</span>
            <div id="authTabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Logowanie</button>
                <button class="tab-btn" onclick="switchAuthTab('register')">Rejestracja</button>
            </div>
            <div class="form-group" id="nickGroup" style="display: none;">
                <label>LOGIN (WYMAGANY)</label>
                <input type="text" id="authNick" placeholder="Twój unikalny nick">
            </div>
            <div class="form-group">
                <label id="loginLabel">E-MAIL</label>
                <input type="text" id="authEmail" placeholder="email@domena.com">
            </div>
            <div class="form-group">
                <label>HASŁO</label>
                <input type="password" id="authPassword">
            </div>
            <button class="btn-save" id="authSubmit" onclick="handleAuth()">ZALOGUJ SIĘ</button>
            
            <div style="text-align: center; margin-top: 15px; border-top: 1px solid #222; padding-top: 15px;">
                <button class="btn-google" onclick="loginWithGoogle()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Kontynuuj z Google
                </button>
            </div>
        </div>
    </div>

    <div id="onboardingModal" class="modal">
        <div class="modal-content">
            <h2>Dokończ konfigurację</h2>
            <p style="font-size: 12px; color: #888;">Wybierz swój unikalny login, aby kontynuować.</p>
            <div class="form-group">
                <label>TWÓJ LOGIN</label>
                <input type="text" id="onboardingNick" placeholder="np. MasterRust">
            </div>
            <button class="btn-save" onclick="saveOnboardingNick()">ZAPISZ I WEJDŹ</button>
        </div>
    </div>

    <div id="teamModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('teamModal', false)">&times;</span>
            <h2>Nowy Team</h2>
            <div class="form-group"><label>NAZWA</label><input type="text" id="teamName"></div>
            <div class="form-group"><label>KRATKA</label><input type="text" id="baseGrid"></div>
            <div class="form-group"><label>GRACZE</label><textarea id="teamPlayers"></textarea></div>
            <button class="btn-save" onclick="addTeam()">ZAPISZ</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
